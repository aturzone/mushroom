  <path d="M6 30 Q6 8 32 8 Q58 8 58 30 Z" fill="#6B3A1F"/>
  <!-- Cap highlight -->
  <path d="M14 22 Q20 12 32 10 Q44 12 50 22 Q42 18 32 18 Q22 18 14 22Z" fill="#8B4F2A" opacity="0.7"/>
  <!-- White spots on cap -->
  <circle cx="22" cy="20" r="5" fill="#F5ECD7"/>
  <circle cx="40" cy="18" r="4" fill="#F5ECD7"/>
  <circle cx="32" cy="26" r="3" fill="#F5ECD7" opacity="0.8"/>
  <circle cx="14" cy="26" r="3" fill="#F5ECD7" opacity="0.7"/>
  <circle cx="48" cy="25" r="2.5" fill="#F5ECD7" opacity="0.7"/>
  <!-- Gills (underside of cap) -->
  <path d="M8 30 Q20 36 32 36 Q44 36 56 30" fill="none" stroke="#C97B2E" stroke-width="1.5" opacity="0.5"/>
  <!-- Stem -->
  <path d="M24 36 Q22 52 24 56 Q28 58 32 58 Q36 58 40 56 Q42 52 40 36 Z" fill="#C97B2E"/>
