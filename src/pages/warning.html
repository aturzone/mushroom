<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushroom — Blocked</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
            background: #0D0B09;
            color: #F5ECD7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 520px;
            width: 90%;
            text-align: center;
        }
        .mushroom-icon {
            width: 88px;
            height: 88px;
            margin: 0 auto 24px;
            animation: bounce 2.5s ease-in-out infinite;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-6px) scale(1.04); }
        }
        h1 {
            font-size: 30px;
            font-weight: 900;
            color: #C24B3A;
            margin-bottom: 8px;
            letter-spacing: -0.6px;
        }
        .subtitle {
            font-size: 15px;
            color: #C4A882;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .score-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: #1E160D;
            border: 1px solid #2A1F12;
            border-radius: 18px;
            padding: 28px 52px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .score-ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 10px;
        }
        .score-ring svg {
            width: 100px;
            height: 100px;
            transform: rotate(-90deg);
            filter: drop-shadow(0 0 10px rgba(194,75,58,0.4));
        }
        .ring-bg  { fill: none; stroke: #261C10; stroke-width: 8; }
        .ring-fill { fill: none; stroke: #C24B3A; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.85s ease; }
        .score-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: 900;
            color: #C24B3A;
            letter-spacing: -1px;
        }
        .score-label {
            font-size: 11px;
            color: #7A6347;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        .url-card {
            background: #1E160D;
            border: 1px solid #2A1F12;
            padding: 14px 20px;
            border-radius: 12px;
            font-family: "SF Mono", "Fira Code", Menlo, monospace;
            font-size: 13px;
            word-break: break-all;
            color: #C4A882;
            margin-bottom: 32px;
            text-align: left;
            max-height: 80px;
            overflow-y: auto;
            line-height: 1.5;
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 13px 32px;
            border: none;
            border-radius: 11px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.18s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:hover  { transform: translateY(-2px); }
        .btn:active { transform: translateY(0) scale(0.97); }
        .btn-back {
            background: #C97B2E;
            color: #0D0B09;
            box-shadow: 0 4px 14px rgba(201,123,46,0.35);
        }
        .btn-back:hover {
            background: #B56A1E;
            box-shadow: 0 6px 18px rgba(201,123,46,0.45);
        }
        .btn-proceed {
            background: transparent;
            border: 1px solid #2A1F12;
            color: #7A6347;
        }
        .btn-proceed:hover {
            border-color: #3D2E1A;
            color: #C4A882;
        }
        .btn-proceed.hidden { display: none; }
        .branding {
            margin-top: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 12px;
            color: #3D2E1A;
            font-weight: 600;
        }
        .branding img {
            width: 22px;
            height: 22px;
            image-rendering: pixelated;
            opacity: 0.6;
        }
    </style>
</head>

    <script>
        const params = new URLSearchParams(window.location.search);
        const blockedUrl = params.get("url") || "";
        const score = parseInt(params.get("score") || "0", 10);
        const bypassAllowed = params.get("bypass") === "true";

        document.getElementById("score-value").textContent = score + "%";
        document.getElementById("url-display").textContent = blockedUrl;

        const circumference = 2 * Math.PI * 42;
        const offset = circumference - (score / 100) * circumference;
        const ringFill = document.getElementById("score-ring-fill");
        ringFill.style.strokeDasharray = circumference;
        setTimeout(function() { ringFill.style.strokeDashoffset = offset; }, 120);

        if (score >= 40) {
            ringFill.style.stroke = "#D4A847";
            document.getElementById("score-value").style.color = "#D4A847";
        }

        if (bypassAllowed) {
            document.getElementById("proceed").classList.remove("hidden");
        }

        document.getElementById("go-back").addEventListener("click", function() {
            if (window.history.length > 1) { window.history.back(); }
            else { window.close(); }
        });
        document.getElementById("proceed").addEventListener("click", function() {
            window.location.href = blockedUrl;
        });
    </script>
