<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mushroom — Blocked</title>
    <style>
        :root {
            --bg: #0D0B09;
            --card: #1E160D;
            --border: #2A1F12;
            --text: #F5ECD7;
            --muted: #C4A882;
            --dim: #7A6347;
            --accent: #C97B2E;
            --danger: #C24B3A;
            --warn: #D4A847;
        }
        body.light {
            --bg: #2C1F11;
            --card: #32240F;
            --border: #3E2C16;
            --text: #F0DDB8;
            --muted: #C9A06A;
            --dim: #856540;
            --accent: #E09040;
            --danger: #D05844;
            --warn: #D4A847;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            transition: background 0.2s, color 0.2s;
        }
        .theme-toggle {
            position: fixed; top: 16px; right: 16px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 6px 10px;
            cursor: pointer; font-size: 16px;
            transition: background 0.15s;
        }
        .theme-toggle:hover { background: var(--border); }
        .container { max-width: 500px; width: 90%; text-align: center; }
        .mushroom-icon {
            width: 80px; height: auto;
            margin: 0 auto 22px;
            display: block;
            image-rendering: pixelated;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-7px); }
        }
        h1 {
            font-size: 28px; font-weight: 900;
            color: var(--danger); margin-bottom: 8px; letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6;
        }
        .score-card {
            display: inline-flex; flex-direction: column; align-items: center;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 26px 48px; margin-bottom: 22px;
        }
        .score-ring { position: relative; width: 96px; height: 96px; margin-bottom: 8px; }
        .score-ring svg { width: 96px; height: 96px; transform: rotate(-90deg); }
        .ring-track { fill: none; stroke: var(--border); stroke-width: 7; }
        .ring-fill  {
            fill: none; stroke: var(--accent); stroke-width: 7;
            stroke-linecap: round; transition: stroke-dashoffset 0.8s ease;
        }
        .score-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -1px;
        }
        .score-label {
            font-size: 11px; color: var(--dim); text-transform: uppercase;
            letter-spacing: 1px; font-weight: 700;
        }
        .url-card {
            background: var(--card); border: 1px solid var(--border);
            padding: 12px 18px; border-radius: 10px;
            font-family: "SF Mono","Fira Code",Menlo,monospace;
            font-size: 12px; word-break: break-all;
            color: var(--muted); margin-bottom: 28px; text-align: left;
            max-height: 72px; overflow-y: auto; line-height: 1.5;
        }
        .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn {
            padding: 12px 28px; border: none; border-radius: 10px;
            font-size: 13px; font-weight: 700; cursor: pointer;
            transition: all 0.15s ease; display: inline-flex;
            align-items: center; gap: 7px;
        }
        .btn:hover  { transform: translateY(-2px); }
        .btn:active { transform: scale(0.97); }
        .btn-back {
            background: var(--accent); color: var(--bg);
            box-shadow: 0 4px 12px rgba(201,123,46,0.3);
        }
        .btn-back:hover { box-shadow: 0 6px 16px rgba(201,123,46,0.4); }
        .btn-proceed {
            background: transparent; border: 1px solid var(--border); color: var(--dim);
        }
        .btn-proceed:hover { border-color: var(--dim); color: var(--muted); }
        .btn-proceed.hidden { display: none; }
        .branding {
            margin-top: 36px; display: flex; align-items: center;
            justify-content: center; gap: 8px;
            font-size: 11px; color: var(--dim); font-weight: 600;
        }
        .branding img { width: 20px; height: auto; image-rendering: pixelated; opacity: 0.5; }
    </style>
</head>

    <script>
        const params = new URLSearchParams(window.location.search);
        const blockedUrl = params.get("url") || "";
        const score = parseInt(params.get("score") || "0", 10);
        const bypassAllowed = params.get("bypass") === "true";

        document.getElementById("score-value").textContent = score + "%";
        document.getElementById("url-display").textContent = blockedUrl;

        // Animate ring
        const circ = 2 * Math.PI * 40;
        const offset = circ - (score / 100) * circ;
        const fill = document.getElementById("score-ring-fill");
        fill.style.strokeDasharray = circ;
        setTimeout(() => { fill.style.strokeDashoffset = offset; }, 100);

        if (bypassAllowed) {
            document.getElementById("proceed").classList.remove("hidden");
        }

        document.getElementById("go-back").addEventListener("click", () => {
            if (window.history.length > 1) window.history.back();
            else window.close();
        });
        document.getElementById("proceed").addEventListener("click", () => {
            window.location.href = blockedUrl;
        });

        // Theme
        const savedTheme = localStorage.getItem("mushroom_theme") || "dark";
        if (savedTheme === "light") {
            document.body.classList.add("light");
            document.getElementById("theme-toggle").textContent = "🌙";
        }
        document.getElementById("theme-toggle").addEventListener("click", () => {
            const isLight = document.body.classList.toggle("light");
            localStorage.setItem("mushroom_theme", isLight ? "light" : "dark");
            document.getElementById("theme-toggle").textContent = isLight ? "🌙" : "☀️";
        });
    </script>
